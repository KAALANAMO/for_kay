<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Kay — from Vika</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Bebas+Neue&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
8
<style>
:root {
--cherry: #7C0116;
--cherry-light: #a8021e;
--hibiscus: #E0A4B0;
--hibiscus-dim: rgba(224,164,176,0.4);
--cream: #FBF5EE;
--dark: #0e0305;
--dark2: #1a0507;
--dark3: #2a0d10;
--gold: #C9A84C;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }
body {
font-family:'Lora',serif;
background:var(--dark);
color:var(--cream);
-webkit-font-smoothing:antialiased;
}
.section{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.section.active{display:flex;}

.bg{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:blur(4px) brightness(0.5);
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.5);
}

button{
  padding:12px 24px;
  border:none;
  border-radius:30px;
  background:#7C0116;
  color:white;
  margin:10px;
}

img.main{
  width:80%;
  max-height:60vh;
  border-radius:12px;
}

.fade{
  animation:fade 1s ease;
}

@keyframes fade{
  from{opacity:0}
  to{opacity:1}
}
</style>

</head>

<body>

<audio id="bgm" src="assets/audio/audio1.mp3" loop></audio>

<!-- ================= SECTION 1 ================= -->

<div id="s1" class="section active">
  <img class="bg" src="assets/special/bg1.png">
  <div class="overlay"></div>

  <div>
    <p>Hey Kay… this is for you.</p>
    <button onclick="start()">listen to this idiot</button>
    <button onclick="skip()">skip</button>
  </div>
</div>

<!-- ================= SECTION 2 ================= -->

<div id="s2" class="section">
  <img id="mug" class="main fade" src="assets/mug/ms1.jpeg">
  <button onclick="nextMug()">next</button>
</div>

<!-- ================= SECTION 3 ================= -->

<div id="s3" class="section">
  <img id="pun" class="main fade" src="assets/punish/p1_hurt.jpeg">

<button onclick="punish(0)">ignore</button> <button onclick="punish(1)">no phone</button> <button onclick="punish(2)">massage</button> <button onclick="punish(3)">bomb</button>

</div>

<!-- ================= SECTION 4 ================= -->

<div id="s4" class="section">
  <img class="bg" src="assets/special/cr_1.jpeg">
  <div class="overlay"></div>

  <div>
    <p>GUILTY. but still loves you.</p>
    <button onclick="mem()">continue</button>
  </div>
</div>

<!-- ================= SECTION 5 ================= -->

<div id="s5" class="section">
  <img id="mem" class="main fade">
  <p id="memText"></p>
</div>

<!-- ================= SECTION 6 ================= -->

<div id="s6" class="section">
  <img class="bg" src="assets/special/bg4.jpeg">
  <div class="overlay"></div>

  <div>
    <p id="letter"></p>
    <button onclick="end()">finish</button>
  </div>
</div>

<script>
let mugIndex=0;
let punishCount=0;
let memIndex=0;

const mugs=[
"assets/mug/ms1.jpeg",
"assets/mug/ms2.jpeg",
"assets/mug/ms3.jpeg",
"assets/mug/ms4.jpeg"
];

const punishImgs=[
"assets/punish/p7_ignore.jpeg",
"assets/punish/p9.jpeg",
"assets/punish/p2_sad.jpeg",
"assets/punish/p4_bomb.jpeg"
];

const memories=[
{img:"assets/memories/m1_east7.jpeg",text:"East 77"},
{img:"assets/memories/m2_juhu.jpeg",text:"Juhu"},
{img:"assets/memories/m3_dnj.jpeg",text:"Dough & Joe"},
{img:"assets/memories/m4_agatsu.jpeg",text:"Agatsu"}
];

function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function start(){
document.getElementById("bgm").play();
show("s2");
}

function skip(){
start();
}

function nextMug(){
mugIndex++;
if(mugIndex>=mugs.length){
show("s3");
return;
}
document.getElementById("mug").src=mugs[mugIndex];
}

function punish(i){
document.getElementById("pun").src=punishImgs[i];
punishCount++;

if(punishCount>=4){
show("s4");
}
}

function mem(){
show("s5");
playMem();
}

function playMem(){
if(memIndex>=memories.length){
show("s6");
document.getElementById("letter").innerText=
"I pizza you Kay. I will fix everything.";
return;
}

document.getElementById("mem").src=memories[memIndex].img;
document.getElementById("memText").innerText=memories[memIndex].text;

memIndex++;
setTimeout(playMem,2500);
}

function end(){
alert("i pizza you ❤️");
}
</script>

</body>
</html>
