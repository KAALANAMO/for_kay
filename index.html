<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Kay ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="music" loop>
  <source src="assets/audio/audio1.mp3" type="audio/mpeg">
</audio>

<!-- ENTRY -->

<section id="entry" class="screen active">
  <div class="overlay">
    <h1>Hey Kay…</h1>
    <p>I made something for you.</p>
    <button onclick="start()">Listen to this idiot</button>
  </div>
  <button id="skipBtn" onclick="skip()">Skip the nonsense</button>
</section>

<!-- MEMORIES -->

<section id="memories" class="screen">
  <img id="memImg">
  <p id="memText"></p>
</section>

<!-- PUNISHMENT -->

<section id="punish" class="screen">
  <img id="punImg">
  <div class="punish-buttons">
    <button onclick="doPunish(0)">Tickle</button>
    <button onclick="doPunish(1)">Feed</button>
    <button onclick="doPunish(2)">Bomb</button>
    <button onclick="doPunish(3)">Ignore</button>
    <button onclick="doPunish(4)">Nails</button>
  </div>
</section>

<!-- COURTROOM -->

<section id="courtroom" class="screen">
  <div class="overlay">
    <div id="courtText"></div>
    <button id="courtBtn" onclick="showLetter()">Continue</button>
  </div>
</section>

<!-- LETTER -->

<section id="letter" class="screen">
  <div class="letterBox">
    <p id="letterText"></p>

</html>
