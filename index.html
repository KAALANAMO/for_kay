<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Kay ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="bgm" src="assets/audio/audio1.mp3" loop></audio>

<!-- SECTION 1 -->

<section id="s1" class="section active">
  <div class="bg"></div>
  <div class="modal">
    <p>
      Hey Kay…<br>
      This is for you.
    </p>
    <button onclick="start()">listen to this idiot</button>
    <button id="skipBtn" onclick="skip()">skip</button>
  </div>
</section>

<!-- SECTION 2 -->

<section id="s2" class="section">
  <img id="mug" src="assets/mug/ms1.jpeg">
  <button onclick="goPunish()">view case file</button>
</section>

<!-- SECTION 3 -->

<section id="s3" class="section">
  <img id="punImg" src="assets/punish/p1_hurt.jpeg">

  <div class="actions">
    <button onclick="punish(0)">Ignore</button>
    <button onclick="punish(1)">No phone</button>
    <button onclick="punish(2)">Massage</button>
    <button onclick="punish(3)">Bomb</button>
  </div>
</section>

<!-- SECTION 4 -->

<section id="s4" class="section">
  <div class="court">
    <p id="courtText"></p>
    <button onclick="goMem()">continue</button>
  </div>
</section>

<!-- SECTION 5 -->

<section id="s5" class="section">
  <img id="memImg">
  <p id="memText"></p>
</section>

<!-- SECTION 6 -->

<section id="s6" class="section">
  <div class="letter">
    <p id="letterText"></p>
    <button onclick="end()">finish</button>
  </div>
</section>

<script src="script.js"></script>

</body>
</html>
